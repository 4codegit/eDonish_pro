name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux
        run: go build -o edonish-pro-linux .

      - name: Build Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -o edonish-pro-windows.exe .
      
      - name: Build macOS
        run: |
          GOOS=darwin GOARCH=amd64 go build -o edonish-pro-macos .

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: edonish-pro-linux
          path: edonish-pro-linux

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: edonish-pro-windows.exe
          path: edonish-pro-windows.exe

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: edonish-pro-macos
          path: edonish-pro-macos
