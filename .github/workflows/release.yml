name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-x11-0 \
            libgl1 \
            libglu1-mesa-dev \
            pkg-config

      - name: Install Fyne
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          fyne package -os linux -appID com.edonish.pro -name edonish-pro

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-pro
          path: edonish-pro
