name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Tidy
        run: go mod tidy
      - name: Build
        run: go build -o edonish-pro .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: edonish-pro
          path: edonish-pro
