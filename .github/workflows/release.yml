name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build Linux binary
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -o edonish-pro-linux .

      - name: Build DEB package
        run: |
          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/share/applications
          cat > deb/DEBIAN/control << EOF
          Package: edonish-pro
          Version: ${{ github.ref_name }}
          Architecture: amd64
          Maintainer: Edonish Team
          Description: Edonish Pro desktop app
          EOF
          cp edonish-pro-linux deb/usr/bin/
          chmod +x deb/usr/bin/edonish-pro-linux
          dpkg-deb --build deb edonish-pro_${{ github.ref_name }}_amd64.deb

      - name: Build RPM package
        run: |
          mkdir -p rpm/SOURCES rpm/SPECS rpm/BUILD
          tar -czvf rpm/SOURCES/edonish-pro-${{ github.ref_name }}.tar.gz \
            --transform 's|^|edonish-pro-${{ github.ref_name }}/|' \
            *.go client/ ui/ go.mod go.sum .gitignore README.md
          cat > rpm/SPECS/edonish-pro.spec << EOF
          Name: edonish-pro
          Version: ${{ github.ref_name }}
          Release: 1%{?dist}
          Summary: Edonish Pro app
          License: MIT
          BuildArch: x86_64
          %description Edonish Pro desktop application
          %prep %setup -q
          %build go mod tidy && GOOS=linux GOARCH=amd64 go build -o edonish-pro .
          %install mkdir -p %{buildroot}/usr/bin && cp edonish-pro %{buildroot}/usr/bin/
          %files /usr/bin/edonish-pro
          EOF
          rpmbuild -bb rpm/SPECS/edonish-pro.spec --define "_topdir $(pwd)/rpm"
          cp rpm/RPMS/x86_64/edonish-pro-${{ github.ref_name }}-1.x86_64.rpm .

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-artifacts
          path: |
            edonish-pro-linux
            edonish-pro_${{ github.ref_name }}_amd64.deb
            edonish-pro-${{ github.ref_name }}-1.x86_64.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Build Windows
        run: |
          go mod tidy
          GOOS=windows GOARCH=amd64 go build -o edonish-pro-windows.exe .
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-artifacts
          path: edonish-pro-windows.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Install Fyne
        run: |
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Build Android
        run: |
          go mod tidy
          fyne package -os android -appID com.edonish.pro -name edonish-pro
        continue-on-error: true
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-artifacts
          path: edonish-pro.apk
        if: success()

  create-release:
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Linux
        uses: actions/download-artifact@v3
        with:
          name: linux-artifacts
      - name: Download Windows
        uses: actions/download-artifact@v3
        with:
          name: windows-artifacts
      - name: Download Android
        uses: actions/download-artifact@v3
        with:
          name: android-artifacts
        continue-on-error: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            edonish-pro-linux
            edonish-pro_${{ github.ref_name }}_amd64.deb
            edonish-pro-${{ github.ref_name }}-1.x86_64.rpm
            edonish-pro-windows.exe
            edonish-pro.apk
          body: |
            ## eDonish Pro ${{ github.ref_name }}
            ### Файлы:
            - Linux binary + DEB + RPM
            - Windows exe
            - Android APK
