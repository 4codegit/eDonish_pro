name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build EXE
        run: go build -o edonish-pro.exe .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: edonish-pro.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install FPM
        run: sudo apt-get update && sudo apt-get install -y rpm ruby ruby-dev && sudo gem install fpm
      - name: Build
        run: go build -o edonish-pro .
      - name: Create DEB
        run: fpm -s dir -t deb -n edonish-pro -v ${GITHUB_REF#refs/tags/} -p edonish-pro_${GITHUB_REF#refs/tags/}_amd64.deb edonish-pro=/usr/bin/edonish-pro
      - name: Create RPM
        run: fpm -s dir -t rpm -n edonish-pro -v ${GITHUB_REF#refs/tags/} -p edonish-pro-${GITHUB_REF#refs/tags/}-1.x86_64.rpm edonish-pro=/usr/bin/edonish-pro
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: edonish-pro_*.deb
      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: edonish-pro-*.rpm

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build
        run: go build -o edonish-pro .
      - name: Create DMG
        run: |
          mkdir -p dmg
          cp edonish-pro dmg/
          hdiutil create -format UDZO -srcfolder dmg -volname edonish-pro edonish-pro.dmg
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: edonish-pro.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows
      - uses: actions/download-artifact@v4
        with:
          name: deb
      - uses: actions/download-artifact@v4
        with:
          name: rpm
      - uses: actions/download-artifact@v4
        with:
          name: macos
      - name: Rename
        run: |
          mv edonish-pro.exe edonish-pro-windows.exe
          mv edonish-pro.dmg edonish-pro-macos.dmg
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            edonish-pro-windows.exe
            edonish-pro_*.deb
            edonish-pro-*.rpm
            edonish-pro-macos.dmg
          body: |
            ## eDonish Pro ${{ github.ref_name }}
            
            - 🪟 Windows: edonish-pro-windows.exe
            - 🐧 Linux DEB: edonish-pro_*.deb
            - 🎩 Linux RPM: edonish-pro-*.rpm
            - 🍎 macOS: edonish-pro-macos.dmg
