name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev

      - name: Build
        env:
          CGO_ENABLED: "1"
          CC: "gcc"
        run: |
          go mod tidy
          go build -v -o edonish-pro .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-pro-linux
          path: edonish-pro
